<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimbus | Weather App</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="app">

    <!-- =========================
         HEADER
    ========================== -->
    <header class="header">
        <h1>Nimbus</h1>
        <p>Real-time weather insights with a modern glass UI</p>
    </header>

    <!-- =========================
         SEARCH SECTION
    ========================== -->
    <section class="search-section">
        <input
            type="text"
            id="city-input"
            placeholder="Enter city name..."
        />
        <button id="search-btn" type="button">Search</button>
    </section>

    <!-- =========================
         STATUS SECTION
         Used for info / loading / success / error
    ========================== -->
   <div class="status-content">
    <div class="spinner hidden" id="spinner"></div>
    <p id="status-message">Search for a city to view the weather.</p>
</div>

    <!-- =========================
         MAIN WEATHER CARD
         Hidden until successful search
    ========================== -->
    <section class="weather-card hidden" id="weather-card">
        <div class="weather-main">
            <div class="weather-location">
                <h2 id="city-name">City</h2>
                <p id="country-name">Country</p>
            </div>

            <div class="weather-icon">
                <span>☁️</span>
            </div>
        </div>

        <div class="weather-temp">
            <h3 id="temperature">--°C</h3>
            <p id="condition">Condition</p>
            <p id="feels-like">Feels like --°C</p>
        </div>
    </section>

    <!-- =========================
         DETAILS GRID
         Hidden until successful search
    ========================== -->
    <section class="details-grid hidden" id="details-grid">
        <article class="detail-card">
            <h4>Humidity</h4>
            <p id="humidity">--%</p>
        </article>

        <article class="detail-card">
            <h4>Wind Speed</h4>
            <p id="wind-speed">-- m/s</p>
        </article>

        <article class="detail-card">
            <h4>Pressure</h4>
            <p id="pressure">-- hPa</p>
        </article>

        <article class="detail-card">
            <h4>Visibility</h4>
            <p id="visibility">-- km</p>
        </article>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
