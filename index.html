<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimbus | Weather App</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- =========================
         APP WRAPPER
    ========================== -->
    <main class="app">

        <!-- =========================
             HEADER
        ========================== -->
        <header class="header">
            <h1>Nimbus</h1>
            <p>Real-time weather insights with a modern glass UI</p>
        </header>

        <!-- =========================
             SEARCH SECTION
        ========================== -->
        <section class="search-section">
            <input
                type="text"
                id="city-input"
                placeholder="Enter city name..."
            />
            <button id="search-btn" type="button">Search</button>
        </section>
